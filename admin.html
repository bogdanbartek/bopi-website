<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Panel cen · BO-PI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#14110d;color:#f2ede3;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;padding:clamp(20px,6vw,72px) 20px}
  a{color:#ffc24b}
  .card{width:100%;max-width:460px;background:linear-gradient(165deg,#1c1812,#161310);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:clamp(24px,5vw,40px);box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
  .logo b{display:grid;place-items:center;width:40px;height:40px;border-radius:11px;background:#ffc24b;color:#14110d;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;box-shadow:0 0 22px rgba(255,194,75,.5)}
  .logo span{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;letter-spacing:.04em}
  .logo small{display:block;font-size:12px;color:#7c7569;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:0}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:26px;margin-bottom:6px}
  .sub{color:#9b948a;font-size:15px;margin-bottom:24px}
  label{display:block;font-size:13px;font-weight:600;color:#c8c0b4;margin:0 0 7px 2px}
  .field{margin-bottom:18px}
  .price-row{position:relative}
  .price-row .unit{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#7c7569;font-size:15px;pointer-events:none}
  input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#f2ede3;font-size:17px;font-family:'Space Mono',monospace;outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:rgba(255,194,75,.6);box-shadow:0 0 0 3px rgba(255,194,75,.12)}
  button{width:100%;padding:15px;border:0;border-radius:999px;background:#ffc24b;color:#14110d;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(255,194,75,.25);transition:transform .15s,box-shadow .2s}
  button:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(255,194,75,.32)}
  button:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .ghost{margin-top:12px;background:transparent;border:1px solid rgba(255,255,255,.14);color:#cdc6ba;box-shadow:none;font-weight:600}
  .ghost:hover{box-shadow:none;border-color:rgba(255,255,255,.28)}
  .msg{margin-top:16px;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:500;display:none}
  .msg.show{display:block}
  .msg.ok{background:rgba(182,255,91,.1);border:1px solid rgba(182,255,91,.3);color:#b6ff5b}
  .msg.err{background:rgba(255,107,91,.1);border:1px solid rgba(255,107,91,.3);color:#ff8d7e}
  .meta{margin-top:18px;font-size:13px;color:#7c7569;text-align:center}
  .hidden{display:none}
  .grid3{display:grid;gap:14px}
  @media(min-width:520px){.grid3{grid-template-columns:1fr 1fr}.grid3 .field:first-child{grid-column:1/-1}}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <b>B</b>
      <span>BO-PI<small>Panel cen paliw</small></span>
    </div>

    <!-- Logowanie -->
    <section id="login-view">
      <h1>Logowanie</h1>
      <p class="sub">Wpisz hasło, aby zmienić ceny paliw.</p>
      <form id="login-form">
        <div class="field">
          <label for="password">Hasło</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <button id="login-btn" type="submit">Zaloguj się</button>
      </form>
    </section>

    <!-- Edycja cen -->
    <section id="editor-view" class="hidden">
      <h1>Ceny paliw</h1>
      <p class="sub">Zmień stawki i zapisz — pojawią się na stronie od razu.</p>
      <form id="price-form">
        <div class="grid3">
          <div class="field">
            <label for="pb95">Pb 95 · benzyna</label>
            <div class="price-row"><input id="pb95" inputmode="decimal" required><span class="unit">zł/l</span></div>
          </div>
          <div class="field">
            <label for="on">ON Diesel</label>
            <div class="price-row"><input id="on" inputmode="decimal" required><span class="unit">zł/l</span></div>
          </div>
          <div class="field">
            <label for="lpg">LPG · autogaz</label>
            <div class="price-row"><input id="lpg" inputmode="decimal" required><span class="unit">zł/l</span></div>
          </div>
        </div>
        <button id="save-btn" type="submit">Zapisz ceny</button>
        <button id="logout-btn" type="button" class="ghost">Wyloguj</button>
      </form>
      <p class="meta" id="updated-meta"></p>
    </section>

    <div id="msg" class="msg"></div>
    <p class="meta"><a href="/">← Powrót na stronę</a></p>
  </div>

<script>
(function () {
  const TOKEN_KEY = 'bopi_admin_token';
  const $ = (id) => document.getElementById(id);
  const loginView = $('login-view');
  const editorView = $('editor-view');
  const msg = $('msg');

  const showMsg = (text, kind) => {
    msg.textContent = text;
    msg.className = 'msg show ' + kind;
  };
  const clearMsg = () => { msg.className = 'msg'; };
  const fmt = (v) => (typeof v === 'number' ? v.toFixed(2).replace('.', ',') : '');

  const getToken = () => sessionStorage.getItem(TOKEN_KEY);
  const setToken = (t) => sessionStorage.setItem(TOKEN_KEY, t);
  const clearToken = () => sessionStorage.removeItem(TOKEN_KEY);

  const showEditor = () => { loginView.classList.add('hidden'); editorView.classList.remove('hidden'); };
  const showLogin = () => { editorView.classList.add('hidden'); loginView.classList.remove('hidden'); };

  // Wczytaj bieżące ceny do formularza.
  const loadCurrent = async () => {
    try {
      const r = await fetch('/.netlify/functions/prices', { cache: 'no-store' });
      if (!r.ok) return;
      const d = await r.json();
      $('pb95').value = fmt(d.pb95);
      $('on').value = fmt(d.on);
      $('lpg').value = fmt(d.lpg);
      const meta = $('updated-meta');
      if (d.updatedAt) {
        meta.textContent = 'Ostatnia zmiana: ' + new Date(d.updatedAt).toLocaleString('pl-PL');
      } else {
        meta.textContent = 'Ceny nie były jeszcze ustawiane (wartości domyślne).';
      }
    } catch (e) { /* ignore */ }
  };

  // Logowanie
  $('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg();
    const btn = $('login-btn');
    btn.disabled = true;
    try {
      const r = await fetch('/.netlify/functions/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: $('password').value })
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) { showMsg(d.error || 'Logowanie nie powiodło się.', 'err'); return; }
      setToken(d.token);
      $('password').value = '';
      showEditor();
      await loadCurrent();
    } catch (e) {
      showMsg('Brak połączenia z serwerem.', 'err');
    } finally {
      btn.disabled = false;
    }
  });

  // Zapis cen
  $('price-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg();
    const btn = $('save-btn');
    btn.disabled = true;
    try {
      const r = await fetch('/.netlify/functions/save-prices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ pb95: $('pb95').value, on: $('on').value, lpg: $('lpg').value })
      });
      const d = await r.json().catch(() => ({}));
      if (r.status === 401) { clearToken(); showLogin(); showMsg(d.error || 'Zaloguj się ponownie.', 'err'); return; }
      if (!r.ok) { showMsg(d.error || 'Nie udało się zapisać.', 'err'); return; }
      $('pb95').value = fmt(d.pb95);
      $('on').value = fmt(d.on);
      $('lpg').value = fmt(d.lpg);
      $('updated-meta').textContent = 'Ostatnia zmiana: ' + new Date(d.updatedAt).toLocaleString('pl-PL');
      showMsg('Zapisano. Ceny są już widoczne na stronie.', 'ok');
    } catch (e) {
      showMsg('Brak połączenia z serwerem.', 'err');
    } finally {
      btn.disabled = false;
    }
  });

  $('logout-btn').addEventListener('click', () => { clearToken(); clearMsg(); showLogin(); });

  // Jeśli mamy token w tej sesji — od razu pokaż edytor.
  if (getToken()) { showEditor(); loadCurrent(); }
})();
</script>
</body>
</html>
